spring:
  application:
    name: gateway-service

  main:
    web-application-type: reactive  # Ensure reactive mode for Gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: service_a_route
              uri: lb://SERVICE-A  # Uppercase to match Eureka
              predicates:
                - Path=/api/service-a/**
            - id: service_b_route
              uri: lb://SERVICE-B  # Uppercase to match Eureka
              predicates:
                - Path=/api/service-b/**
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

    config:
      enabled: true

    discovery:
      enabled: true

  config:
    import: "optional:configserver:http://localhost:8888"


