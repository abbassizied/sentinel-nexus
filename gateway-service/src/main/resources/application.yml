spring:
  application:
    name: gateway-service

  main:
    web-application-type: reactive  # Ensure reactive mode for Gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true # Flag that enables DiscoveryClient gateway integration
          lower-case-service-id: true # Option to lower case serviceId in predicates and filters, defaults to false. Useful with eureka when it automatically uppercases serviceId. so MYSERIVCE, would match /myservice/**

      routes:
        - id: service_a_route
          uri: lb://SERVICE-A  # Uppercase to match Eureka
          predicates:
          - Path=/service-a/**
        - id: service_b_route
          uri: lb://SERVICE-B # Uppercase to match Eureka
          predicates:
          - Path=/service-b/**
    discovery:
      enabled: true
    config:
      enabled: false


eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/  # Eureka Server URL
  instance:
    prefer-ip-address: true
