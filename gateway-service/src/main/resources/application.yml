spring:
  application:
    name: gateway-service

  main:
    web-application-type: reactive  # Ensure reactive mode for Gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # Optional: if you prefer static routes instead of dynamic discovery
      routes:
        - id: service_a_route
          uri: lb://service-a
          predicates:
            - Path=/api/service-a/**
          filters:
            - RewritePath=/api/service-a/(?<remaining>.*), /${remaining}

        - id: service_b_route
          uri: lb://service-b
          predicates:
            - Path=/api/service-b/**
          filters:
            - RewritePath=/api/service-b/(?<remaining>.*), /${remaining}

    config:
      enabled: false

    discovery:
      enabled: true



